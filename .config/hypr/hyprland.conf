# ------------------------------ Multi-GPU Setup ------------------------------ #
# https://wiki.hyprland.org/Configuring/Multi-GPU/
env = WLR_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0
env = XCURSOR_SIZE,36
env = HYPRCURSOR_SIZE,36
env = HYPRCURSOR_THEME,catppuccin-mocha-sky-cursors

# ------------------------------- Monitor Setup ------------------------------- #
# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,auto

# Dual monitor example on G15 Strix
# eDP-1 is the built in monitor while DP-1 is external
# Both monitors here are at 1440 and 165Hz
# DP-1 is on the left and  eDP-1 is on the right
# monitor=HDMI-A-1,2560x1440@60,0x0,1
# monitor=eDP-1,1920x1080@60,2560x360,1
# monitor=eDP-1,disable
# monitor=eDP-1,1920x1080@60,2560x0,1

# ------------------------------- Startup Apps -------------------------------- #
# See https://wiki.hyprland.org/Configuring/Keywords/ for more
exec-once = ~/.config/hypr/xdg-portal-hyprland
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = waybar
exec-once = mako
exec-once = awww-daemon && awww img awww img --resize="fit"  $(find ~/Pictures/wallpapers -type f | shuf -n 1)
exec-once = fcitx5 --replace -d
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = systemctl --user restart pipewire
exec-once = ~/.config/hypr/scripts/auto_monitor
exec-shutdown = pkill mihomo
# exec-once = hyprexpose
# exec-once = ~/.config/hypr/scripts/auto_ratio
# exec-once = udiskie
# exec-once = [ ! -s ~/.config/mpd/pid ] && mpd

# ----------------------------- Source External ------------------------------- #
# source = ~/.config/hypr/myColors.conf

# -------------------------------- Input Config ------------------------------- #
# For all categories, see https://wiki.hyprland.org/Configuring/Uncommon-tips--tricks/#switchable-keyboard-layouts
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

# -------------------------------- Misc Config -------------------------------- #
misc {
   disable_hyprland_logo = true
   disable_splash_rendering = true
   enable_swallow = true
   vfr = true
   # force_hypr_chan = true
}

# ------------------------------ General Config ------------------------------- #
# See https://wiki.hyprland.org/Configuring/Variables/#Sections for more
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 0
    allow_tearing=true
    layout = scrolling
    # resize_on_border = true
    # extend_border_grab_area = 15
    # hover_icon_on_border = true
    # col.active_border = rgb(000000)
    # col.inactive_border = rgb(595959)
    # layout = dwindle
    # layout = master
}

# ------------------------------- Layout Config ------------------------------- #
# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    # new_is_master = true
    # no_gaps_when_only = true
    new_on_top = true
    new_status = slave
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true
    preserve_split = true
    # no_gaps_when_only = -1
}

scrolling {
    fullscreen_on_one_column = true
    column_width = 0.7
    focus_fit_method = 1
    follow_focus = true
    follow_min_visible = 0.3
    explicit_column_widths = 0.333, 0.5, 0.667, 1.0
    direction = left
}

# ------------------------------ Gestures Config ------------------------------ #
# See https://wiki.hyprland.org/Configuring/Variables/ for more
gesture = 3, horizontal, workspace, e+1

# ---------------------------- Decoration Config ------------------------------ #
# See https://wiki.hyprland.org/Configuring/Variables/ for more
decoration {
    rounding = 18
    active_opacity = 0.8
    inactive_opacity = 0.9
    fullscreen_opacity = 0.93
    dim_around = 0.6
    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        new_optimizations = true
        xray = true
        size = 6
        passes = 2
        vibrancy = 0.1696
    }

    dim_inactive = true
    dim_strength = 0.3
}

# ---------------------------- Animations Config ------------------------------ #
# Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
animations {
    enabled = true
    bezier = bounce, 0.2, 1.1, 0.3, 1.1
    bezier = overshot,0.05,0.9,0.1,1.1
    animation = windowsIn, 1, 7, default, popin 85%
    animation = windowsOut, 1, 8, default, popin 85%
    # animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 8, default, slidefade 65%
    # animation = workspaces,1,8,default,slide
}

# -------------------------------- Debug Config ------------------------------- #
#debug {
 #overlay = true
#}

# ------------------------------ Window Rules --------------------------------- #
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# workspace = 1, layoutopt:direction:right
# workspace = 2, layoutopt:direction:down
# workspace = 1, layout:scrolling
# workspace = 2, layout:dwindle

layerrule = blur on, match:namespace logout_dialog
layerrule = blur on, match:namespace notifications
layerrule = blur on, dim_around on, no_anim on, match:namespace wofi
layerrule = ignore_alpha 0.8,match:namespace notifications
# layerrule = blur_popups on,match:namespace notifications

windowrule {
    name = musicfox
    workspace = 3
    idle_inhibit = focus
    match:title = ^(musicfox)$
}

windowrule {
    name = workspace-apps
    workspace = 4
    idle_inhibit = focus
    match:class = ^(deepseek)$
}

windowrule {
    name = workspace-apps
    workspace = 5
    idle_inhibit = focus
    match:class = ^(mihomoui)$
}

windowrule {
    name = telegram
    workspace = 6
    idle_inhibit = focus
    match:class = ^(org.telegram.desktop)$
}

windowrule {
    name = imv
    opacity = 1.5 1.5
    match:class = ^(imv|com.gabm.satty|mpv)$
}

windowrule {
    name = wofi
    dim_around = on
    animation = popin,50%
    match:class = ^(wofi)$
}


windowrule {
    name = float-center-large-title
    float = on
    size = 1440 950
    center = on
    match:title = ^(satty|btop|Media viewer|yazi|Open [Ff]iles|Open Folder|Open [Ff]ile|Save File|Volume Control)$
}

windowrule {
    name = float-center-large-class
    float = on
    size = 1440 950
    center = on
    match:class = ^(imv|yad|org.pulseaudio.pavucontrol|thunar|qt5ct|download|org.kde.polkit-kde-authentication-agent-1)$
}


windowrule {
    name = pip-mode
    float = on
    pin = on
    size = (monitor_w*0.25)
    move = ((monitor_w*0.73)) ((monitor_h*0.72))
    no_shadow = on
    match:title = ^([Pp]icture-in-[Pp]icture)$
}

windowrule {
    name = pinned
    match:pin = true
    border_size = 2
    no_shadow = false
    border_color = rgba(000000ff)
}

# ---------------------------------- Keybinds --------------------------------- #
# See https://wiki.hyprland.org/Configuring/Binds/ for more
bindd = ALT, RETURN, Open Terminal, exec, kitty
bindd = ALT, Q, Open foot Terminal, exec, foot

# wofi launched program
bindd = ALT, SPACE, Launch Applications, exec, pkill wofi || wofi
bindd = SUPER, SPACE, Switch Applications (Switch), exec, pkill wofi || ~/.config/hypr/scripts/window_switch switch
bindd = SUPER, V, Show Clipboard History, exec, pkill wofi || ~/.config/hypr/scripts/cliphist
bindd = SUPER SHIFT, V, Custom actions of Clipboard, exec, pkill wofi || ~/.config/hypr/scripts/cliphist -m
bindd = ALT, B, Change Wallpaper, exec, pkill wofi || ~/.config/hypr/scripts/wallpaper
bindd = ALT, O, Open projects with vscode, exec,pkill wofi || ~/.config/hypr/scripts/projects
bindd = ALT, TAB, Switch Applications (Move), exec,pkill wofi || ~/.config/hypr/scripts/window_switch move


#  foot holded program
bindd = SUPER, T, Voice type with whisper, exec, ~/.config/hypr/scripts/dictation toggle
bindd = SUPER, B, Open System Monitor, exec, foot --title btop sh -c btop
bindd = SUPER, E, Open File Manager, exec, foot --title yazi sh -c yazi
bindd = SUPER, M, Open Music Player, exec, foot --title musicfox sh -c musicfox
bindd = SUPER, N, Show System Info, exec, foot --hold sh -c neofetch
bindd = SUPER, C, Open Audio Visualizer, exec, foot sh -c cava

# yad launched program
bindd = ALT, F1, Open keybinds, exec, pkill yad || ~/.config/hypr/scripts/binds --yad
bindd = ALT, F2, Open Mihomo ui, exec, ~/.config/hypr/scripts/mihomo ui
bindd = ALT, F3, Mihomo Speed Test, exec, ~/.config/hypr/scripts/mihomo switch
bindd = SUPER, RETURN, Open Deepseek using yad, exec, ~/.config/hypr/scripts/aichat

bindd = ALT, S, Take Screenshot, exec, ~/.config/hypr/scripts/screenshot
bindd = SUPER SHIFT, S, OCR Translate, exec, ~/.config/hypr/scripts/ocr_translate


bindd = ALT, W, Close Active Window, killactive
bindd = ALT, C, Pick Color and Copy, exec, hyprpicker -a | cliphist store
bindd = ALT, F4, Show Logout Menu, exec, wlogout --protocol layer-shell
bindd = ALT, F, Toggle Floating and Resize, exec, hyprctl dispatch togglefloating active && hyprctl dispatch resizeactive exact 1440 950 && hyprctl dispatch centerwindow active
bindd = ALT, G, Toggle Game Mode, exec, ~/.config/hypr/scripts/gamemode
bindd = ALT, H, Toggle scrolling direction,exec,~/.config/hypr/scripts/toggle_direction

bindd = SUPER, D, Minimize Active Window, exec, ~/.config/hypr/scripts/minimize
bindd = SUPER, S, Change layout, exec, ~/.config/hypr/scripts/layout_switch
bindd = SUPER, L, Lock Screen, exec, swaylock
bindd = SUPER, O, Toggle Window Opacity, exec, hyprctl dispatch setprop "address:$(hyprctl activewindow -j | jq -r '.address')" opaque toggle
bindd = SUPER, F, Toggle Fullscreen, fullscreen
bindd = SUPER, Z, Toggle Split Layout, togglesplit
bindd = SUPER, U, Swap with Next Window, swapnext
bindd = SUPER, P, Pin the window, exec,~/.config/hypr/scripts/pin

bindd = SUPER SHIFT, R, Reload Hyprland, exec, hyprctl reload

# ------------------------- Hardware Control Bindings ------------------------- #
#bindd = ,F4, Toggle Speaker Mute, exec, pamixer -t
#bindd = ,F5, Decrease Volume 5%, exec, pamixer -d 5
#bindd = ,F6, Increase Volume 5%, exec, pamixer -i 5
#bindd = ,F7, Toggle Microphone Mute, exec, pamixer --default-source -t
