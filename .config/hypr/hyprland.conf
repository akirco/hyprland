# --------------------------- Window Focus Movement --------------------------- #
# $dimOn = hyprctl keyword decoration:dim_inactive true
bindd = CONTROL, left, Move Focus Left, movefocus, l
bindd = CONTROL, right, Move Focus Right, movefocus, r
bindd = CONTROL, up, Move Focus Up, movefocus, u
bindd = CONTROL, down, Move Focus Down, movefocus, d
# bind = CONTROL, left, exec, $dimOn
# bind = CONTROL, right, exec, $dimOn
# bind = CONTROL, up, exec, $dimOn
# bind = CONTROL, down, exec, $dimOn

bindd = SUPER, Tab, Cycle Next, cyclenext,
bindd = SUPER, Tab, Bring Active to Top, bringactivetotop,
bindd = SUPER, Z, Toggle minimized window,togglespecialworkspace, min
bindd = SUPER, K,Toggle show keys services,exec,~/.config/hypr/scripts/showkeys

# ---------------------- Move Window to Workspace Bindings -------------------- #
# Move window to workspace: Super + Shift + arrow keys
bindd = SUPER SHIFT, Right, Move to Right Workspace, movetoworkspace, r+1
bindd = SUPER SHIFT, Left, Move to Left Workspace, movetoworkspace, r-1
bindd = SUPER SHIFT, Down, Move to New, movetoworkspace, empty

# ------------------------ Workspace Scroll Switching ------------------------- #
bindd = SUPER, left, Next Workspace, exec,~/.config/hypr/scripts/smartworkspace prev
bindd = SUPER, right, Previous Workspace, exec,~/.config/hypr/scripts/smartworkspace next

# bindd = SUPER, comma, Resize Left, layoutmsg, move -col
# bindd = SUPER, period, Resize Right, layoutmsg, move +col

bindd = SUPER, comma, Resize Left, layoutmsg, colresize -0.05
bindd = SUPER, period, Resize Right, layoutmsg, colresize +0.05


# Force create new workspace between current and next occupied
bindd = SUPER, Down, Force New Workspace, exec, ~/.config/hypr/scripts/smartworkspace new_down
bindd = SUPER, Up, Back to Workspace, exec, ~/.config/hypr/scripts/smartworkspace back_up




# ----------------------------- Mouse Bindings ------------------------------- #
binddm = SUPER, mouse:272, Move Window, movewindow
binddm = SUPER, mouse:273, Resize Window, resizewindow

# ------------------------------- Window Resize ------------------------------- #
bindd = CONTROL SHIFT, left, Resize Window Left, resizeactive, -50 0
bindd = CONTROL SHIFT, right, Resize Window Right, resizeactive, 50 0
bindd = CONTROL SHIFT, up, Resize Window Up, resizeactive, 0 -20
bindd = CONTROL SHIFT, down, Resize Window Down, resizeactive, 0 20



# ------------------- Opacity and Wallpaper Adjustment ------------------------ #
bindd = ALT SHIFT, up, Increase Opacity, exec, ~/.config/hypr/scripts/opacity +
bindd = ALT SHIFT, down, Decrease Opacity, exec, ~/.config/hypr/scripts/opacity -

bindd = SUPER, minus, Zoom Factor .5x,exec, hyprctl keyword cursor:zoom_factor 0.5
binddr = SUPER, minus, Zoom Factor .5x,exec, hyprctl keyword cursor:zoom_factor 1
bindd = SUPER, equal, Zoom Factor 2x, exec, hyprctl keyword cursor:zoom_factor 2
binddr = SUPER, equal, Zoom Factor Reset, exec, hyprctl keyword cursor:zoom_factor 1
